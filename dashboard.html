<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acompanhamento de Implementação e Reformas de Praças</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.heat -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050d08;--bg2:#07120c;--bg3:#0b1a12;--border:#0f3a20;--border2:#1f5531;
      --green:#2dd38a;--muted:#7fbf96;--txt:#d7f8e8;--font:'Source Sans 3',sans-serif;
      --filter-bg: rgba(3,6,4,0.92);
      --filter-border: rgba(45,211,138,0.18);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;flex-direction:column;height:100vh;overflow:hidden}
    #hdr{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid rgba(0,0,0,0.2);background:linear-gradient(90deg,#020805,#081409)}
    #hdr h1{font-size:16px;color:#bff6d8}
    #hdr .kpis{display:flex;gap:18px}
    .kpi-small{text-align:right}
    .kpi-val{font-family:monospace;font-weight:700;color:var(--green);font-size:18px}
    .kpi-label{font-size:11px;color:var(--muted)}
    #main{display:flex;flex:1;overflow:hidden;position:relative}
    #map{flex:1;min-width:0;height:100%}
    #panel{width:420px;background:var(--bg2);border-left:1px solid rgba(0,0,0,0.25);display:flex;flex-direction:column;overflow:auto}

    #tabs{
      display:flex;flex-wrap:wrap;gap:6px;background:var(--bg);
      border-bottom:1px solid rgba(0,0,0,0.2);position:sticky;top:0;z-index:20;padding:6px 8px;
    }
    .tab{
      flex:1 1 auto;min-width:80px;padding:6px 8px;text-align:center;font-weight:700;
      color:var(--muted);cursor:pointer;font-size:12px;white-space:nowrap;overflow:hidden;
      text-overflow:ellipsis;border-radius:8px;background:transparent;
    }
    .tab.active{color:var(--green);border-bottom:2px solid var(--green);background:rgba(45,211,138,0.02)}

    .tc{display:none;padding:14px;gap:12px;flex-direction:column}
    .tc.active{display:flex}
    .card{background:var(--bg3);border:1px solid rgba(0,0,0,0.2);border-radius:10px;padding:12px}
    .card h4{font-size:13px;color:var(--muted);margin-bottom:8px}
    .kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
    .kbox{background:var(--bg);padding:12px;border-radius:8px;border:1px solid rgba(0,0,0,0.2);text-align:center}
    .kbox .val{font-family:monospace;font-weight:700;color:var(--green);font-size:20px}

    .photo-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    #btn-expand-photo{
      display:none;background:transparent;border:1px solid rgba(45,211,138,0.25);
      color:var(--green);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;
      gap:5px;align-items:center;transition:background 0.15s;
    }
    #btn-expand-photo.visible{display:flex}

    #photo-viewer{
      margin-top:0;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#020604;border:1px dashed var(--border);border-radius:10px;overflow:hidden;
    }
    #photo-viewer img{ width:100%; height:auto; display:none; cursor:zoom-in; }
    #photo-viewer .placeholder{ color:var(--border2); text-align:center; padding:20px; font-size:13px; }
    .photo-caption{padding:8px; font-size:12px; background:rgba(0,0,0,0.5); width:100%; text-align:center; color:var(--green); display:none;}

    #lightbox{
      display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.92);
      align-items:center;justify-content:center;flex-direction:column;animation:lbFadeIn 0.2s ease;
    }
    #lightbox.open{display:flex}
    #lightbox img{max-width:92vw;max-height:85vh;border-radius:10px;object-fit:contain;}
    #lightbox-caption{margin-top:14px;font-size:14px;color:var(--green);font-weight:600;text-align:center;padding:0 16px;}
    #lightbox-close{
      position:absolute;top:18px;right:22px;background:transparent;border:1px solid rgba(255,255,255,0.15);
      color:#fff;font-size:22px;border-radius:8px;padding:4px 12px;cursor:pointer;
    }

    #filterBar{
      position:absolute;top:12px;left:37%;transform:translateX(-50%);z-index:900;
      display:flex;gap:10px;align-items:center;padding:12px;border-radius:14px;
      background:var(--filter-bg);border:1px solid var(--filter-border);
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }
    .flt-item{display:flex;flex-direction:column;gap:4px;}
    .flt-item label{font-size:11px;color:var(--green);font-weight:700;}
    .flt-select{background:transparent;border:1px solid rgba(45,211,138,0.18);color:var(--txt);padding:6px 10px;border-radius:8px;min-width:130px;}
    .flt-select option{background:#07120c;color:var(--txt)}
    .flt-clear{padding:8px 14px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);cursor:pointer}

    #basemap-toggle{
      position:absolute;top:12px;right:440px;z-index:1000;display:flex;
      background:var(--filter-bg);border-radius:12px;padding:4px;border:1px solid var(--filter-border);
    }
    .bm-btn{
      padding:8px 12px;border-radius:8px;color:var(--muted);cursor:pointer;font-weight:700;font-size:11px;
      background:transparent;border:none;transition:all 0.2s;
    }
    .bm-btn.active{background:rgba(45,211,138,0.15);color:var(--green);}

    .leaflet-control-legend{
      background:var(--filter-bg);border:1px solid var(--filter-border);color:var(--muted);
      padding:10px;border-radius:10px;font-size:11px;
    }

    @media(max-width:900px){
      body{height:auto;overflow:auto}
      #main{flex-direction:column;height:auto}
      #map{height:50vh;width:100%}
      #panel{width:100%}
      #filterBar{position:relative;top:0;left:0;transform:none;width:100%;border-radius:0;}
      #basemap-toggle{position:relative;top:0;right:0;width:100%;justify-content:center;border-radius:0;}
    }
  </style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>Acompanhamento de Implementação e Reformas de Praças</h1>
    <div class="small" style="font-size:11px; color:var(--muted)">Mãe do Rio/PA</div>
  </div>
  <div class="kpis">
    <div class="kpi-small"><div class="kpi-val" id="h-total">—</div><div class="kpi-label">Número de Praças</div></div>
    <div class="kpi-small"><div class="kpi-val" id="h-days">—</div><div class="kpi-label">População Assistida</div></div>
  </div>
</div>

<div id="main">
  <div id="map"></div>

  <div id="filterBar">
    <div class="flt-item"><label>Bairro</label><select id="f-bairro" class="flt-select"></select></div>
    <div class="flt-item"><label>Local</label><select id="f-local" class="flt-select"></select></div>
    <button id="btn-clear" class="flt-clear">Limpar</button>
  </div>

  <div id="basemap-toggle">
    <button class="bm-btn active" id="bm-osm" onclick="setBasemap('osm')">🗺️ Mapa</button>
    <button class="bm-btn" id="bm-sat" onclick="setBasemap('sat')">🛰️ Satélite</button>
    <button class="bm-btn" id="bm-heat" onclick="setBasemap('heat')">🔥 Calor</button>
  </div>

  <div id="panel">
    <div id="tabs">
      <div class="tab active" data-tab="analise">Visão Geral</div>
      <div class="tab" data-tab="ranking">Ranking</div>
    </div>
    <div id="tc-analise" class="tc active">
      <div class="kgrid">
        <div class="kbox"><div class="val" id="v-pracas">—</div><div class="small" style="font-size:11px">Praças</div></div>
        <div class="kbox"><div class="val" id="v-populacao">—</div><div class="small" style="font-size:11px">População</div></div>
      </div>
      <div class="card">
        <div class="photo-card-header"><h4>Visualizar Imagem</h4><button id="btn-expand-photo" onclick="openLightbox()">⛶ Expandir</button></div>
        <div id="photo-viewer">
          <div class="placeholder">Clique em uma praça no mapa para ver a foto</div>
          <img id="main-photo" src="" alt="" onclick="openLightbox()">
          <div id="main-caption" class="photo-caption"></div>
        </div>
      </div>
    </div>
    <div id="tc-ranking" class="tc"><div class="card"><canvas id="ch-rank" style="height:350px"></canvas></div></div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>

<script>
const GEOJSON_URL = 'locais_pracas_mdr.geojson';
const BAIRROS_URL = 'bairros.geojson';

let raw = [], filtered = [], map, markersLayer, charts = {}, heatLayer;
let tileDark, tileOSM, tileSat, heatActive = false;

function initUI(){
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tc').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tc-' + t.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    document.getElementById('f-bairro').value = '';
    updateLocalOptions('');
    document.getElementById('f-local').value = '';
    applyFilters();
  });
  document.getElementById('f-local').addEventListener('change', applyFilters);
}

function tryAutoFetch(){
  fetch(GEOJSON_URL)
    .then(r => r.json())
    .then(geojson => {
      raw = normalizeGeoJSON(geojson.features);
      initMap();
      populateFilters();
      applyFilters();
      plotBairrosPolygons();
    }).catch(e => console.error(e));
}

function normalizeGeoJSON(features){
  return features.map(f => ({
    bairro: String(f.properties?.bairro || '').trim(),
    local: String(f.properties?.local || f.properties?.nome || 'Local sem nome').trim(),
    populacao: parseFloat(f.properties?.populacao) || 0,
    foto: f.properties?.foto || '',
    lat: f.geometry?.coordinates[1],
    lon: f.geometry?.coordinates[0]
  }));
}

function initMap(){
  // Coordenadas aproximadas de Mãe do Rio - PA
  map = L.map('map', { center:[-2.05, -47.55], zoom:14 });

  tileOSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
  // Usando CartoDB Dark Matter em vez de Stadia Maps para evitar erro 401
  tileDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
  tileSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

  tileOSM.addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  heatLayer = L.heatLayer([], { radius:25, blur:15, max: 1.0 });
}

function setBasemap(type){
  document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('bm-' + type).classList.add('active');

  [tileOSM, tileDark, tileSat, heatLayer, markersLayer].forEach(l => { if(map.hasLayer(l)) map.removeLayer(l); });

  if(type === 'osm'){ tileOSM.addTo(map); markersLayer.addTo(map); heatActive = false; }
  else if(type === 'sat'){ tileSat.addTo(map); markersLayer.addTo(map); heatActive = false; }
  else if(type === 'heat'){ tileDark.addTo(map); heatLayer.addTo(map); heatActive = true; }
  
  renderMarkersAndFit();
}

function applyFilters(){
  const b = document.getElementById('f-bairro').value;
  const l = document.getElementById('f-local').value;
  
  filtered = raw.filter(d => (!b || d.bairro === b) && (!l || d.local === l));
  
  updateKPIs(b);
  renderMarkersAndFit();
  buildRanking();
}

function renderMarkersAndFit(){
  markersLayer.clearLayers();
  const hp = [];
  filtered.forEach(d => {
    if(d.lat && d.lon){
      const m = L.circleMarker([d.lat, d.lon], {radius:7, color:'#1d4ed8', fillColor:'#3b82f6', fillOpacity:0.8});
      m.bindPopup(`<strong>${d.local}</strong><br>Pop: ${d.populacao}`);
      m.on('click', () => showPhoto(d.local, d.foto));
      markersLayer.addLayer(m);
      hp.push([d.lat, d.lon, 0.7]);
    }
  });
  heatLayer.setLatLngs(hp);
  if(filtered.length > 0) {
    const bounds = L.latLngBounds(filtered.map(d => [d.lat, d.lon]));
    map.fitBounds(bounds, {padding:[50,50], maxZoom:16});
  }
}

function populateFilters(){
  const unique = (arr) => [...new Set(arr)].sort();
  const bEl = document.getElementById('f-bairro');
  bEl.innerHTML = '<option value="">Todos</option>' + unique(raw.map(d => d.bairro)).map(v => `<option value="${v}">${v}</option>`).join('');
  bEl.addEventListener('change', () => { updateLocalOptions(bEl.value); applyFilters(); });
  updateLocalOptions('');
}

function updateLocalOptions(selB){
  const lEl = document.getElementById('f-local');
  const filteredLocais = selB ? raw.filter(d => d.bairro === selB) : raw;
  const locais = [...new Set(filteredLocais.map(d => d.local))].sort();
  lEl.innerHTML = '<option value="">Todos</option>' + locais.map(v => `<option value="${v}">${v}</option>`).join('');
}

function updateKPIs(bAtivo){
  const total = filtered.length;
  const pop = filtered.reduce((s,d) => s + d.populacao, 0);
  document.getElementById('h-total').textContent = total;
  document.getElementById('v-pracas').textContent = total;
  document.getElementById('h-days').textContent = bAtivo ? pop.toLocaleString() : '—';
  document.getElementById('v-populacao').textContent = bAtivo ? pop.toLocaleString() : '—';
}

function showPhoto(local, foto){
  const img = document.getElementById('main-photo');
  const cap = document.getElementById('main-caption');
  const btn = document.getElementById('btn-expand-photo');
  if(foto){
    img.src = foto; img.style.display='block';
    cap.innerText = local; cap.style.display='block';
    btn.classList.add('visible');
    document.querySelector('.placeholder').style.display='none';
  }
}

function buildRanking(){
  const data = {};
  filtered.forEach(d => { data[d.bairro] = (data[d.bairro] || 0) + d.populacao; });
  const sorted = Object.entries(data).sort((a,b) => b[1]-a[1]).slice(0,10);
  
  if(charts['ch-rank']) charts['ch-rank'].destroy();
  charts['ch-rank'] = new Chart(document.getElementById('ch-rank'), {
    type:'bar',
    data: { labels: sorted.map(x=>x[0]), datasets: [{label:'População', data:sorted.map(x=>x[1]), backgroundColor:'#2dd38a'}]},
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false }
  });
}

function plotBairrosPolygons() {
  fetch(BAIRROS_URL).then(r => r.json()).then(g => {
    L.geoJSON(g, {style: {color: "#2dd38a", weight: 1, fillOpacity: 0.05}}).addTo(map);
  }).catch(e => console.log("Bairros GeoJSON não encontrado"));
}

function openLightbox(){ 
  const src = document.getElementById('main-photo').src;
  if(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-caption').innerText = document.getElementById('main-caption').innerText;
    document.getElementById('lightbox').classList.add('open');
  }
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

initUI();
tryAutoFetch();
</script>
</body>
</html>
